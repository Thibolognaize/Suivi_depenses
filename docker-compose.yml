version: '3.8'

services:
  db:
    image: mysql:8
    restart: always # ou restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - suivi-depenses-network

  import-data:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - .:/app
    networks:
      - suivi-depenses-network
    profiles: ["import-data"] # To start : docker-compose --profile import up

networks:
  suivi-depenses-network:
    driver: bridge

volumes:
  mysql-data:
